version: "3.8"
services:
  frontend:
    build: ./E-Commerce_Frontend
    ports:
      - "3000:3000"
    depends_on:
      - backend

  backend:
    build: ./E-Commerce_Backend
    ports:
      - "5454:5454"
    depends_on:
       mysql-test:
         condition: service_healthy
    
  mysql-test:
     image: mysql:8.0
     environment:
        MYSQL_ROOT_PASSWORD: root
        MYSQL_DATABASE: testdb
        MYSQL_USER: user
        MYSQL_PASSWORD: root
     ports:
        - "3306:3306"
     healthcheck:
        test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
        interval: 10s
        timeout: 5s
        retries: 5 
